<!DOCTYPE html>
<html>
<head>
    <title>Criar Usuário Admin</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin: 10px 0; }
        label { display: block; margin-bottom: 5px; }
        input, button { padding: 10px; width: 300px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Criar Usuário Administrador</h1>
    
    <form id="adminForm">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" value="admin@parquedoseucaliptos.com" required>
        </div>
        
        <div class="form-group">
            <label for="password">Senha:</label>
            <input type="password" id="password" value="senha123456" required>
        </div>
        
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" value="Administrador Sistema" required>
        </div>
        
        <div class="form-group">
            <label for="chacara">Chácara:</label>
            <input type="text" id="chacara" value="Administração">
        </div>
        
        <button type="submit">Criar Usuário Admin</button>
    </form>
    
    <div id="result"></div>

    <script>
        document.getElementById('adminForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const dados = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                nome: document.getElementById('nome').value,
                chacara: document.getElementById('chacara').value
            };
            
            try {
                const response = await fetch('http://localhost:3000/api/admin/criar-usuario-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(dados)
                });
                
                const result = await response.json();
                const resultDiv = document.getElementById('result');
                
                if (result.success) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>Usuário criado com sucesso!</h3>
                        <p><strong>ID:</strong> ${result.user.id}</p>
                        <p><strong>Email:</strong> ${result.user.email}</p>
                        <p><strong>Nome:</strong> ${result.user.nome}</p>
                        <p><strong>Tipo:</strong> ${result.user.tipo_usuario}</p>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `<h3>Erro:</h3><p>${result.error}</p>`;
                }
            } catch (error) {
                const resultDiv = document.getElementById('result');
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `<h3>Erro na requisição:</h3><p>${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
